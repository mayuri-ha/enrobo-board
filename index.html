<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENROBO 課題管理プラットフォーム</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;
  --bg-secondary:#f7f7f5;
  --bg-tertiary:#f0efea;
  --text-primary:#1a1a1a;
  --text-secondary:#666666;
  --text-tertiary:#999999;
  --border-light:rgba(0,0,0,0.08);
  --border-mid:rgba(0,0,0,0.15);
  --border-strong:rgba(0,0,0,0.25);
  --brand:#1D9E75;
  --brand-light:#E1F5EE;
  --brand-dark:#0F6E56;
  --brand-mid:#5DCAA5;
  --radius-sm:6px;
  --radius-md:8px;
  --radius-lg:12px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.12);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--bg-tertiary);color:var(--text-primary);font-size:14px;line-height:1.5}

/* ==== Topbar ==== */
.topbar{background:var(--bg-primary);border-bottom:1px solid var(--border-light);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;background:var(--brand);color:#fff;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-badge{background:var(--brand);color:#fff;font-size:11px;font-weight:500;padding:2px 8px;border-radius:var(--radius-sm)}
.topbar-right{display:flex;align-items:center;gap:12px}
.auth-placeholder{font-size:12px;color:var(--text-tertiary);background:var(--bg-secondary);border:1px dashed var(--border-mid);border-radius:var(--radius-md);padding:4px 10px;display:flex;align-items:center;gap:4px}
.role-toggle{display:flex;gap:4px;background:var(--bg-secondary);padding:3px;border-radius:var(--radius-md)}
.role-btn{font-size:12px;padding:5px 12px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-weight:500;transition:all .15s}
.role-btn.active{background:#fff;color:var(--brand-dark);box-shadow:var(--shadow-sm)}
.notify-bell{position:relative;cursor:pointer;padding:6px;border-radius:var(--radius-sm);transition:background .15s}
.notify-bell:hover{background:var(--bg-secondary)}
.notify-bell i{font-size:20px;color:var(--text-secondary)}
.notify-badge{position:absolute;top:2px;right:2px;background:#E24B4A;color:#fff;font-size:9px;font-weight:600;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* ==== Layout ==== */
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:220px;background:var(--bg-primary);border-right:1px solid var(--border-light);padding:16px 12px;flex-shrink:0}
.sidebar-section{margin-bottom:20px}
.sidebar-label{font-size:11px;color:var(--text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;padding:0 8px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-md);font-size:13px;color:var(--text-secondary);cursor:pointer;margin-bottom:2px;transition:all .15s;font-weight:500}
.nav-item:hover{background:var(--bg-secondary)}
.nav-item.active{background:var(--brand-light);color:var(--brand-dark)}
.nav-item i{font-size:16px}
.badge-count{margin-left:auto;font-size:11px;background:var(--bg-secondary);color:var(--text-secondary);border-radius:10px;padding:1px 7px;font-weight:600}
.nav-item.active .badge-count{background:var(--brand-mid);color:var(--brand-dark)}

.main{flex:1;padding:24px;overflow:auto;min-width:0}

/* ==== Page Header ==== */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title{font-size:20px;font-weight:600}
.page-title-row{display:flex;align-items:center;gap:10px}
.page-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ==== Buttons ==== */
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:7px 14px;border-radius:var(--radius-md);border:1px solid var(--border-mid);background:var(--bg-primary);color:var(--text-primary);cursor:pointer;font-weight:500;transition:all .15s;font-family:inherit}
.btn:hover{background:var(--bg-secondary);border-color:var(--border-strong)}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-primary:hover{background:var(--brand-dark);border-color:var(--brand-dark)}
.btn-sm{font-size:12px;padding:5px 10px}
.btn-icon{padding:6px;border-radius:var(--radius-sm)}
.btn-ghost{border:none;background:transparent;color:var(--text-secondary)}
.btn-ghost:hover{background:var(--bg-secondary)}
.btn-danger{color:#E24B4A;border-color:#F7C1C1}
.btn-danger:hover{background:#FCEBEB;border-color:#E24B4A}

/* ==== Filter Row ==== */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-chip{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border-mid);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;transition:all .15s;font-weight:500}
.filter-chip:hover{border-color:var(--border-strong)}
.filter-chip.active{background:var(--brand-light);color:var(--brand-dark);border-color:var(--brand-mid)}
.filter-divider{width:1px;height:20px;background:var(--border-light);margin:0 4px}
.search-box{display:flex;align-items:center;gap:6px;background:var(--bg-primary);border:1px solid var(--border-mid);border-radius:var(--radius-md);padding:5px 10px;flex:1;min-width:200px;max-width:280px}
.search-box i{color:var(--text-tertiary);font-size:14px}
.search-box input{border:none;outline:none;background:transparent;flex:1;font-size:13px;font-family:inherit;color:var(--text-primary);min-width:0}

/* ==== Stats Row ==== */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg-primary);border:1px solid var(--border-light);border-radius:var(--radius-md);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;font-weight:500}
.stat-val{font-size:24px;font-weight:600;line-height:1.2}
.stat-sub{font-size:11px;color:var(--text-tertiary);margin-top:2px}

/* ==== Issue Cards ==== */
.issue-list{display:flex;flex-direction:column;gap:8px}
.issue-card{background:var(--bg-primary);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;transition:all .15s}
.issue-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-sm)}
.issue-card.selected{border-color:var(--brand-mid);box-shadow:0 0 0 2px var(--brand-light)}
.issue-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.priority-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.p-high{background:#E24B4A}
.p-mid{background:#EF9F27}
.p-low{background:#639922}
.issue-id{font-size:11px;color:var(--text-tertiary);font-weight:600;font-family:'SF Mono','Menlo',monospace}
.issue-title{font-size:14px;font-weight:500;flex:1;line-height:1.4}
.status-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:var(--radius-sm);flex-shrink:0}
.s-new{background:#E6F1FB;color:#185FA5}
.s-open{background:#FAEEDA;color:#854F0B}
.s-inprogress{background:#E1F5EE;color:#0F6E56}
.s-done{background:#EAF3DE;color:#3B6D11}
.s-onhold{background:#F1EFE8;color:#5F5E5A}
.issue-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text-tertiary);flex-wrap:wrap}
.meta-item{display:flex;align-items:center;gap:4px}
.meta-item i{font-size:14px}
.assignee-chip{display:flex;align-items:center;gap:5px;background:var(--bg-secondary);border-radius:20px;padding:2px 8px 2px 3px}
.avatar{width:20px;height:20px;border-radius:50%;background:var(--brand-mid);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--brand-dark);flex-shrink:0}
.avatar-lg{width:32px;height:32px;font-size:13px}

/* ==== Detail Modal ==== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--bg-primary);border-radius:var(--radius-lg);width:90%;max-width:720px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);transform:scale(0.95);transition:transform .2s}
.modal-overlay.show .modal{transform:scale(1)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;gap:12px}
.detail-id{font-size:11px;color:var(--text-tertiary);font-family:'SF Mono','Menlo',monospace;margin-bottom:6px;font-weight:600}
.detail-title{font-size:18px;font-weight:600;line-height:1.4}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.detail-field{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 12px}
.detail-field-label{font-size:11px;color:var(--text-secondary);font-weight:500;margin-bottom:4px}
.detail-field-value{font-size:13px;font-weight:500}
.detail-section-title{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.03em}
.detail-desc{background:var(--bg-secondary);border-radius:var(--radius-md);padding:14px;font-size:13px;line-height:1.6;margin-bottom:20px;white-space:pre-wrap}

/* ==== Comments ==== */
.comment-list{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.comment{display:flex;gap:10px}
.comment-body{flex:1;min-width:0}
.comment-bubble{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 12px}
.comment-bubble.staff{background:var(--brand-light)}
.comment-meta{font-size:11px;color:var(--text-tertiary);margin-bottom:4px;display:flex;gap:8px;align-items:center}
.comment-user{font-weight:600;color:var(--text-secondary)}
.comment-text{font-size:13px;line-height:1.5;white-space:pre-wrap}
.comment-input-row{display:flex;gap:8px;align-items:flex-end}
.comment-input{flex:1;font-size:13px;padding:8px 12px;border-radius:var(--radius-md);border:1px solid var(--border-mid);background:var(--bg-primary);color:var(--text-primary);font-family:inherit;resize:vertical;min-height:38px;max-height:120px;outline:none}
.comment-input:focus{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-light)}

/* ==== Form ==== */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text-secondary)}
.form-label .req{color:#E24B4A;margin-left:2px}
.form-input,.form-select,.form-textarea{width:100%;font-size:13px;padding:8px 12px;border-radius:var(--radius-md);border:1px solid var(--border-mid);background:var(--bg-primary);color:var(--text-primary);font-family:inherit;outline:none;transition:all .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-light)}
.form-textarea{min-height:100px;resize:vertical;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-help{font-size:11px;color:var(--text-tertiary);margin-top:4px}

/* ==== Dashboard ==== */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.dash-card{background:var(--bg-primary);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:16px 18px}
.dash-card-title{font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.dash-card-title i{font-size:16px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.bar-label{width:80px;color:var(--text-secondary);flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--bg-secondary);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--brand);border-radius:4px;transition:width .3s}
.bar-val{width:30px;text-align:right;font-weight:600;font-size:12px;color:var(--text-primary)}
.donut-wrap{display:flex;align-items:center;gap:16px}
.donut-svg{flex-shrink:0}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:6px;font-size:12px}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.legend-label{flex:1;color:var(--text-secondary)}
.legend-val{font-weight:600}

/* ==== Notification Panel ==== */
.notify-panel{position:absolute;top:54px;right:20px;width:340px;background:var(--bg-primary);border:1px solid var(--border-light);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);max-height:480px;display:flex;flex-direction:column;z-index:150;display:none}
.notify-panel.show{display:flex}
.notify-header{padding:12px 16px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center}
.notify-list{overflow-y:auto;flex:1}
.notify-item{padding:12px 16px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .15s}
.notify-item:hover{background:var(--bg-secondary)}
.notify-item.unread{background:#F0F8FA}
.notify-item-title{font-size:13px;font-weight:500;margin-bottom:2px}
.notify-item-meta{font-size:11px;color:var(--text-tertiary)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-tertiary);font-size:13px}
.empty-state i{font-size:40px;margin-bottom:8px;display:block;color:var(--border-strong)}

/* ==== Toast ==== */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--text-primary);color:#fff;padding:10px 16px;border-radius:var(--radius-md);font-size:13px;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;animation:toastIn .25s ease-out;max-width:320px}
.toast.success{background:var(--brand-dark)}
.toast.error{background:#A32D2D}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ==== Status Dropdown in detail ==== */
.status-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.status-actions select{font-size:12px;padding:6px 10px;border-radius:var(--radius-md);border:1px solid var(--border-mid);background:var(--bg-primary);font-family:inherit;cursor:pointer;outline:none}

/* ==== View Toggle ==== */
.view-section{display:none}
.view-section.active{display:block}

/* ==== Mobile ==== */
@media (max-width:768px){
  .sidebar{display:none}
  .main{padding:16px}
  .auth-placeholder{display:none}
  .topbar{padding:0 12px}
  .modal{width:100%;height:100%;max-height:100vh;border-radius:0}
}

/* ==== Empty filter result ==== */
.no-results{text-align:center;padding:40px 20px;color:var(--text-tertiary);background:var(--bg-primary);border:1px dashed var(--border-mid);border-radius:var(--radius-lg)}
.no-results i{font-size:32px;margin-bottom:8px;display:block}

/* ==== Activity log ==== */
.activity-list{display:flex;flex-direction:column;gap:8px}
.activity-item{display:flex;gap:10px;font-size:12px;padding:8px 0;border-bottom:1px solid var(--border-light)}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:24px;height:24px;border-radius:50%;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.activity-icon i{font-size:13px;color:var(--text-secondary)}
.activity-content{flex:1}
.activity-meta{color:var(--text-tertiary);font-size:11px}
</style>
</head>
<body>

<!-- ===== Topbar ===== -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-robot"></i></div>
    ENROBO
    <span class="logo-badge">課題管理</span>
  </div>
  <div class="topbar-right">
    <span class="auth-placeholder"><i class="ti ti-lock" style="font-size:12px"></i> 認証は後で差し込み</span>
    <div class="role-toggle">
      <button class="role-btn active" data-role="staff" onclick="setRole('staff')">担当者</button>
      <button class="role-btn" data-role="client" onclick="setRole('client')">クライアント</button>
    </div>
    <div class="notify-bell" onclick="toggleNotify(event)">
      <i class="ti ti-bell"></i>
      <span class="notify-badge" id="notify-badge">3</span>
    </div>
  </div>
</div>

<!-- ===== Notification Panel ===== -->
<div class="notify-panel" id="notify-panel">
  <div class="notify-header">
    <div style="font-size:13px;font-weight:600">通知</div>
    <button class="btn btn-sm btn-ghost" onclick="markAllRead()">すべて既読</button>
  </div>
  <div class="notify-list" id="notify-list"></div>
</div>

<!-- ===== Layout ===== -->
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">メニュー</div>
      <div class="nav-item active" data-view="list" onclick="setView('list')">
        <i class="ti ti-list-check"></i>
        課題一覧
        <span class="badge-count" id="nav-list-count">0</span>
      </div>
      <div class="nav-item" data-view="dashboard" onclick="setView('dashboard')">
        <i class="ti ti-chart-bar"></i>
        ダッシュボード
      </div>
      <div class="nav-item" data-view="new" onclick="setView('new')">
        <i class="ti ti-file-plus"></i>
        課題を起票する
      </div>
    </div>
    <div class="sidebar-section staff-only">
      <div class="sidebar-label">クライアント</div>
      <div id="client-nav"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">設定</div>
      <div class="nav-item" onclick="exportData()">
        <i class="ti ti-download"></i>
        データ書き出し
      </div>
      <div class="nav-item" onclick="resetData()">
        <i class="ti ti-refresh"></i>
        初期データに戻す
      </div>
    </div>
  </div>

  <div class="main">
    <!-- ===== List View ===== -->
    <div class="view-section active" id="view-list">
      <div class="page-header">
        <div class="page-title-row">
          <div class="page-title">課題一覧</div>
        </div>
        <div class="page-actions">
          <div class="search-box">
            <i class="ti ti-search"></i>
            <input type="text" id="search-input" placeholder="課題を検索..." oninput="renderList()">
          </div>
          <button class="btn btn-primary" onclick="setView('new')">
            <i class="ti ti-plus"></i> 新規登録
          </button>
        </div>
      </div>

      <div class="filter-row">
        <span class="filter-chip active" data-filter="all" onclick="filterStatus('all', this)">すべて</span>
        <span class="filter-chip" data-filter="new" onclick="filterStatus('new', this)">新規</span>
        <span class="filter-chip" data-filter="open" onclick="filterStatus('open', this)">受付済</span>
        <span class="filter-chip" data-filter="inprogress" onclick="filterStatus('inprogress', this)">対応中</span>
        <span class="filter-chip" data-filter="onhold" onclick="filterStatus('onhold', this)">保留</span>
        <span class="filter-chip" data-filter="done" onclick="filterStatus('done', this)">完了</span>
        <div class="filter-divider"></div>
        <select class="form-select" style="width:auto;font-size:12px;padding:5px 10px" id="priority-filter" onchange="renderList()">
          <option value="all">優先度すべて</option>
          <option value="high">高</option>
          <option value="mid">中</option>
          <option value="low">低</option>
        </select>
        <select class="form-select" style="width:auto;font-size:12px;padding:5px 10px" id="sort-by" onchange="renderList()">
          <option value="date-desc">新しい順</option>
          <option value="date-asc">古い順</option>
          <option value="priority">優先度順</option>
          <option value="status">ステータス順</option>
        </select>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">総課題数</div>
          <div class="stat-val" id="s-total">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">新規・未対応</div>
          <div class="stat-val" style="color:#185FA5" id="s-new">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">対応中</div>
          <div class="stat-val" style="color:#0F6E56" id="s-prog">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">今月完了</div>
          <div class="stat-val" style="color:#3B6D11" id="s-done">0</div>
        </div>
      </div>

<script>
// ============ State ============
const STORAGE_KEY = 'enrobo-board-v1';
const DEFAULT_DATA = {
  issues: [

    {id:'ISS-004',title:'バッチ処理の実行時間を短縮したい',status:'onhold',priority:'low',client:'C社',assignee:'田中',category:'機能追加要望',date:'2025-04-28',updated:'2025-05-01 09:00',desc:'夜間バッチが朝までに終わらないことがあります。',comments:[]},
    {id:'ISS-003',title:'API連携のタイムアウト設定変更',status:'done',priority:'mid',client:'A社',assignee:'鈴木',category:'機能追加要望',date:'2025-04-25',updated:'2025-04-26 15:00',desc:'外部API連携のタイムアウト設定を延長したい。',comments:[]},
    {id:'ISS-002',title:'年末調整画面のレイアウト改善',status:'done',priority:'low',client:'B社',assignee:'佐藤',category:'機能追加要望',date:'2025-04-20',updated:'2025-04-22 11:00',desc:'年末調整画面が見づらいので改善してほしい。',comments:[]},
    {id:'ISS-001',title:'初期設定マニュアルの記載誤り',status:'done',priority:'low',client:'A社',assignee:'高橋',category:'操作に関する質問',date:'2025-04-15',updated:'2025-04-16 13:00',desc:'マニュアルの記載に誤りがありました。',comments:[]},
  ],
  notifications: [
    {id:1,title:'ISS-012 に新しいコメントが追加されました',issueId:'ISS-012',time:'14:22',read:false},
    {id:2,title:'ISS-009 のステータスが対応中になりました',issueId:'ISS-009',time:'昨日',read:false},
    {id:3,title:'ISS-011 が起票されました',issueId:'ISS-011',time:'2日前',read:false},
  ],
  activity: [
    {time:'14:22',text:'A社 山田 さんが ISS-012 にコメントしました',icon:'message'},
    {time:'10:00',text:'鈴木 さんが ISS-011 のステータスを「対応中」に変更しました',icon:'arrow-right'},
    {time:'昨日',text:'佐藤 さんが ISS-009 にコメントしました',icon:'message'},
    {time:'昨日',text:'田中 さんが ISS-010 を受付しました',icon:'check'},
    {time:'2日前',text:'B社 鈴木 さんが ISS-008 を完了にしました',icon:'circle-check'},
  ]
};

let state = loadState();
let currentRole = 'staff';
let currentView = 'list';
let currentFilter = 'all';
let currentClient = null;
let currentIssue = null;

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveState(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
}

const statusLabel = {new:'新規',open:'受付済',inprogress:'対応中',onhold:'保留',done:'完了'};
const priorityLabel = {high:'高',mid:'中',low:'低'};
const statusClass = {new:'s-new',open:'s-open',inprogress:'s-inprogress',onhold:'s-onhold',done:'s-done'};
const priorityClass = {high:'p-high',mid:'p-mid',low:'p-low'};
const statusColors = {new:'#378ADD',open:'#EF9F27',inprogress:'#1D9E75',onhold:'#888780',done:'#639922'};

// ============ Role / View ============
function setRole(r){
  currentRole = r;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.toggle('active', b.dataset.role===r));
  document.querySelectorAll('.staff-only').forEach(el=>el.style.display = r==='staff'?'':'none');
  // Refresh current view
  if(currentIssue) openDetail(currentIssue.id);
  renderAll();
}

function setView(v){
  currentView = v;
  document.querySelectorAll('.view-section').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-item[data-view]').forEach(el=>el.classList.toggle('active', el.dataset.view===v));
  if(v==='dashboard') renderDashboard();
  if(v==='new') {
    document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  }
}

// ============ Filter ============
function filterStatus(s, el){
  currentFilter = s;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function filterByClient(client){
  currentClient = currentClient===client?null:client;
  document.querySelectorAll('#client-nav .nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.client===currentClient);
  });
  setView('list');
  renderList();
}

// ============ List Rendering ============
function getFilteredIssues(){
  const search = document.getElementById('search-input').value.trim().toLowerCase();
  const priorityFilter = document.getElementById('priority-filter').value;
  const sortBy = document.getElementById('sort-by').value;

  let filtered = state.issues.filter(i=>{
    if(currentFilter!=='all' && i.status!==currentFilter) return false;
    if(priorityFilter!=='all' && i.priority!==priorityFilter) return false;
    if(currentClient && i.client!==currentClient) return false;
    if(currentRole==='client' && i.client!=='A社') return false; // Demo: client only sees their own
    if(search){
      const hay = (i.title+' '+i.desc+' '+i.id).toLowerCase();
      if(!hay.includes(search)) return false;
    }
    return true;
  });

  const priorityOrder = {high:0,mid:1,low:2};
  const statusOrder = {new:0,open:1,inprogress:2,onhold:3,done:4};
  filtered.sort((a,b)=>{
    if(sortBy==='date-desc') return b.date.localeCompare(a.date);
    if(sortBy==='date-asc') return a.date.localeCompare(b.date);
    if(sortBy==='priority') return priorityOrder[a.priority]-priorityOrder[b.priority];
    if(sortBy==='status') return statusOrder[a.status]-statusOrder[b.status];
    return 0;
  });
  return filtered;
}

function renderList(){
  const filtered = getFilteredIssues();
  const list = document.getElementById('issue-list');

  if(filtered.length===0){
    list.innerHTML = `<div class="no-results">
      <i class="ti ti-search-off"></i>
      条件に合う課題が見つかりませんでした
    </div>`;
  } else {
    list.innerHTML = filtered.map(i=>`
      <div class="issue-card${currentIssue&&currentIssue.id===i.id?' selected':''}" onclick="openDetail('${i.id}')">
        <div class="issue-top">
          <div class="priority-dot ${priorityClass[i.priority]}" title="優先度：${priorityLabel[i.priority]}"></div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
              <span class="issue-id">${i.id}</span>
              <span class="status-badge ${statusClass[i.status]}">${statusLabel[i.status]}</span>
              <span style="font-size:11px;color:var(--text-tertiary)">${i.category||''}</span>
            </div>
            <div class="issue-title">${escapeHtml(i.title)}</div>
          </div>
        </div>
        <div class="issue-meta">
          <span class="meta-item"><i class="ti ti-building"></i>${i.client}</span>
          ${i.assignee?`<span class="assignee-chip"><div class="avatar">${i.assignee[0]}</div>${i.assignee}</span>`:'<span style="font-size:11px;color:var(--text-tertiary)">担当未割当</span>'}
          <span class="meta-item" style="margin-left:auto"><i class="ti ti-message"></i>${i.comments.length}</span>
          <span class="meta-item"><i class="ti ti-calendar"></i>${i.date.slice(5)}</span>
        </div>
      </div>
    `).join('');
  }

  // Stats
  const total = state.issues.length;
  const newCount = state.issues.filter(i=>i.status==='new').length;
  const progCount = state.issues.filter(i=>i.status==='inprogress').length;
  const thisMonth = new Date().toISOString().slice(0,7);
  const doneThisMonth = state.issues.filter(i=>i.status==='done' && i.updated && i.updated.startsWith(thisMonth)).length;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-new').textContent = newCount;
  document.getElementById('s-prog').textContent = progCount;
  document.getElementById('s-done').textContent = doneThisMonth;
  document.getElementById('nav-list-count').textContent = total;
}

function renderClientNav(){
  const clients = [...new Set(state.issues.map(i=>i.client))];
  document.getElementById('client-nav').innerHTML = clients.map(c=>{
    const count = state.issues.filter(i=>i.client===c).length;
    return `<div class="nav-item${currentClient===c?' active':''}" data-client="${c}" onclick="filterByClient('${c}')">
      <i class="ti ti-building"></i>${c}
      <span class="badge-count">${count}</span>
    </div>`;
  }).join('');
}

// ============ Detail Modal ============
function openDetail(id){
  const i = state.issues.find(x=>x.id===id);
  if(!i) return;
  currentIssue = i;

  document.getElementById('d-id').textContent = i.id;
  document.getElementById('d-title').textContent = i.title;
  document.getElementById('d-priority').textContent = priorityLabel[i.priority];
  document.getElementById('d-client').textContent = i.client;
  document.getElementById('d-assignee').textContent = i.assignee||'未割当';
  document.getElementById('d-category').textContent = i.category||'-';
  document.getElementById('d-date').textContent = i.date;
  document.getElementById('d-desc').textContent = i.desc||'(詳細記載なし)';
  document.getElementById('d-updated').textContent = i.updated?`最終更新: ${i.updated}`:'';

  const sb = document.getElementById('d-status-badge');
  sb.className = 'status-badge '+statusClass[i.status];
  sb.textContent = statusLabel[i.status];

  document.getElementById('status-select').value = i.status;
  document.getElementById('assignee-select').value = i.assignee||'';
  document.getElementById('priority-select').value = i.priority;

  renderComments(i);

  document.getElementById('detail-modal').classList.add('show');
  renderList();
}

function closeDetail(){
  currentIssue = null;
  document.getElementById('detail-modal').classList.remove('show');
  renderList();
}

function renderComments(i){
  const cl = document.getElementById('comment-list');
  if(i.comments.length===0){
    cl.innerHTML = `<div style="font-size:12px;color:var(--text-tertiary);text-align:center;padding:16px">まだコメントはありません</div>`;
    return;
  }
  cl.innerHTML = i.comments.map(c=>`
    <div class="comment">
      <div class="avatar avatar-lg">${c.user[0]}</div>
      <div class="comment-body">
        <div class="comment-meta">
          <span class="comment-user">${c.user}</span>
          <span>${c.time}</span>
        </div>
        <div class="comment-bubble ${c.role==='staff'?'staff':''}">
          <div class="comment-text">${escapeHtml(c.text)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function addComment(){
  const inp = document.getElementById('comment-input');
  const text = inp.value.trim();
  if(!text || !currentIssue) return;
  const now = new Date();
  const t = `${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const userName = currentRole==='staff'?'担当者':(currentIssue.client+' '+'ユーザー');
  currentIssue.comments.push({user:userName, role:currentRole, time:t, text});
  currentIssue.updated = formatNow();
  inp.value = '';
  saveState();
  renderComments(currentIssue);
  renderList();
  showToast('コメントを送信しました', 'success');
  if(currentRole==='client'){
    addNotification(`${currentIssue.id} に新しいコメントが追加されました`, currentIssue.id);
  }
}

function updateField(field, value){
  if(!currentIssue) return;
  const oldVal = currentIssue[field];
  currentIssue[field] = value;
  currentIssue.updated = formatNow();
  if(field==='status'){
    const sb = document.getElementById('d-status-badge');
    sb.className = 'status-badge '+statusClass[value];
    sb.textContent = statusLabel[value];
    addActivity(`${currentIssue.id} のステータスを「${statusLabel[value]}」に変更しました`, 'arrow-right');
  }
  if(field==='assignee'){
    document.getElementById('d-assignee').textContent = value||'未割当';
  }
  if(field==='priority'){
    document.getElementById('d-priority').textContent = priorityLabel[value];
  }
  saveState();
  renderList();
  showToast(`${field==='status'?'ステータス':field==='assignee'?'担当者':'優先度'}を更新しました`, 'success');
}

function notifyClient(){
  if(!currentIssue) return;
  addNotification(`${currentIssue.id} について担当者から通知があります`, currentIssue.id);
  addActivity(`${currentIssue.id} のクライアントに通知を送信しました`, 'bell');
  showToast('クライアントに通知を送信しました', 'success');
}

function deleteIssue(){
  if(!currentIssue) return;
  if(!confirm(`${currentIssue.id} を削除しますか？この操作は取り消せません。`)) return;
  state.issues = state.issues.filter(i=>i.id!==currentIssue.id);
  saveState();
  closeDetail();
  renderAll();
  showToast('課題を削除しました', 'success');
}

// ============ New Issue Form ============
function submitNewIssue(){
  const client = document.getElementById('f-client').value;
  const title = document.getElementById('f-title').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const category = document.getElementById('f-category').value;
  const priority = document.getElementById('f-priority').value;
  const date = document.getElementById('f-date').value || new Date().toISOString().slice(0,10);

  if(!client || !title || !desc){
    showToast('必須項目を入力してください', 'error');
    return;
  }

  const maxId = state.issues.reduce((m,i)=>Math.max(m, parseInt(i.id.replace('ISS-',''))||0), 0);
  const newIssue = {
    id: 'ISS-'+pad(maxId+1, 3),
    title, desc, category, priority, client, date,
    status: 'new',
    assignee: '',
    updated: formatNow(),
    comments: []
  };
  state.issues.unshift(newIssue);
  saveState();

  addActivity(`${newIssue.id} が起票されました`, 'plus');
  addNotification(`新規課題 ${newIssue.id} が起票されました`, newIssue.id);

  // Reset form
  document.getElementById('f-client').value = '';
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-priority').value = 'mid';

  showToast('課題を登録しました', 'success');
  setView('list');
  renderAll();
}

// ============ Notifications ============
function toggleNotify(e){
  e.stopPropagation();
  const panel = document.getElementById('notify-panel');
  panel.classList.toggle('show');
  if(panel.classList.contains('show')) renderNotifications();
}

document.addEventListener('click', (e)=>{
  const panel = document.getElementById('notify-panel');
  const bell = document.querySelector('.notify-bell');
  if(panel.classList.contains('show') && !panel.contains(e.target) && !bell.contains(e.target)){
    panel.classList.remove('show');
  }
});

function renderNotifications(){
  const list = document.getElementById('notify-list');
  if(state.notifications.length===0){
    list.innerHTML = `<div class="empty-state"><i class="ti ti-bell-off"></i>新しい通知はありません</div>`;
  } else {
    list.innerHTML = state.notifications.map(n=>`
      <div class="notify-item ${!n.read?'unread':''}" onclick="readNotification(${n.id})">
        <div class="notify-item-title">${escapeHtml(n.title)}</div>
        <div class="notify-item-meta">${n.time}</div>
      </div>
    `).join('');
  }
  updateNotifyBadge();
}

function readNotification(id){
  const n = state.notifications.find(x=>x.id===id);
  if(n){
    n.read = true;
    saveState();
    if(n.issueId){
      document.getElementById('notify-panel').classList.remove('show');
      openDetail(n.issueId);
    }
    renderNotifications();
  }
}

function markAllRead(){
  state.notifications.forEach(n=>n.read=true);
  saveState();
  renderNotifications();
}

function addNotification(title, issueId){
  state.notifications.unshift({
    id: Date.now(),
    title, issueId,
    time: 'たった今',
    read: false
  });
  if(state.notifications.length>20) state.notifications = state.notifications.slice(0,20);
  saveState();
  updateNotifyBadge();
}

function updateNotifyBadge(){
  const unread = state.notifications.filter(n=>!n.read).length;
  const badge = document.getElementById('notify-badge');
  badge.textContent = unread;
  badge.style.display = unread>0?'flex':'none';
}

function addActivity(text, icon){
  state.activity.unshift({time:'たった今', text, icon:icon||'circle'});
  if(state.activity.length>30) state.activity = state.activity.slice(0,30);
  saveState();
}

// ============ Dashboard ============
function renderDashboard(){
  // Stats
  const total = state.issues.length;
  const newCount = state.issues.filter(i=>i.status==='new').length;
  const progCount = state.issues.filter(i=>i.status==='inprogress').length;
  const doneCount = state.issues.filter(i=>i.status==='done').length;
  const avgDays = total>0 ? Math.round(state.issues.filter(i=>i.status==='done').length / total * 100) : 0;

  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">総課題数</div><div class="stat-val">${total}</div></div>
    <div class="stat-card"><div class="stat-label">未対応</div><div class="stat-val" style="color:#185FA5">${newCount}</div></div>
    <div class="stat-card"><div class="stat-label">対応中</div><div class="stat-val" style="color:#0F6E56">${progCount}</div></div>
    <div class="stat-card"><div class="stat-label">完了</div><div class="stat-val" style="color:#3B6D11">${doneCount}</div></div>
    <div class="stat-card"><div class="stat-label">完了率</div><div class="stat-val">${avgDays}%</div></div>
  `;

  // Donut chart
  renderDonut();

  // Client bars
  const clients = {};
  state.issues.forEach(i=>{ clients[i.client]=(clients[i.client]||0)+1 });
  const maxClient = Math.max(...Object.values(clients), 1);
  document.getElementById('client-bars').innerHTML = Object.entries(clients).map(([c,n])=>`
    <div class="bar-row">
      <div class="bar-label">${c}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${n/maxClient*100}%"></div></div>
      <div class="bar-val">${n}</div>
    </div>
  `).join('');

  // Priority bars
  const priorities = {high:0,mid:0,low:0};
  state.issues.forEach(i=>{ priorities[i.priority]++ });
  const maxP = Math.max(...Object.values(priorities), 1);
  const pColors = {high:'#E24B4A', mid:'#EF9F27', low:'#639922'};
  document.getElementById('priority-bars').innerHTML = ['high','mid','low'].map(p=>`
    <div class="bar-row">
      <div class="bar-label">${priorityLabel[p]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${priorities[p]/maxP*100}%;background:${pColors[p]}"></div></div>
      <div class="bar-val">${priorities[p]}</div>
    </div>
  `).join('');

  // Activity
  document.getElementById('activity-list').innerHTML = state.activity.slice(0,8).map(a=>`
    <div class="activity-item">
      <div class="activity-icon"><i class="ti ti-${a.icon}"></i></div>
      <div class="activity-content">
        <div>${escapeHtml(a.text)}</div>
        <div class="activity-meta">${a.time}</div>
      </div>
    </div>
  `).join('') || `<div style="font-size:12px;color:var(--text-tertiary);text-align:center;padding:16px">アクティビティはありません</div>`;
}

function renderDonut(){
  const svg = document.getElementById('donut-chart');
  const counts = {};
  state.issues.forEach(i=>{ counts[i.status]=(counts[i.status]||0)+1 });
  const total = state.issues.length || 1;

  const cx=60, cy=60, r=45, sw=14;
  let angle = -Math.PI/2;
  let paths = '';
  const order = ['new','open','inprogress','onhold','done'];

  order.forEach(s=>{
    const n = counts[s]||0;
    if(n===0) return;
    const frac = n/total;
    const a2 = angle + frac*Math.PI*2;
    const x1 = cx + r*Math.cos(angle);
    const y1 = cy + r*Math.sin(angle);
    const x2 = cx + r*Math.cos(a2);
    const y2 = cy + r*Math.sin(a2);
    const large = frac>0.5?1:0;
    paths += `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}" stroke="${statusColors[s]}" stroke-width="${sw}" fill="none"/>`;
    angle = a2;
  });

  svg.innerHTML = `
    ${paths}
    <text x="60" y="56" text-anchor="middle" font-size="20" font-weight="600" fill="var(--text-primary)">${total}</text>
    <text x="60" y="72" text-anchor="middle" font-size="10" fill="var(--text-tertiary)">課題</text>
  `;

  document.getElementById('donut-legend').innerHTML = order.filter(s=>counts[s]).map(s=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${statusColors[s]}"></div>
      <div class="legend-label">${statusLabel[s]}</div>
      <div class="legend-val">${counts[s]}</div>
    </div>
  `).join('');
}

// ============ Utils ============
function pad(n, len){ return String(n).padStart(len||2,'0') }
function formatNow(){
  const n = new Date();
  return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())} ${pad(n.getHours())}:${pad(n.getMinutes())}`;
}
function escapeHtml(s){
  if(!s) return '';
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showToast(msg, type){
  const cont = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast '+(type||'');
  const icon = type==='success'?'check':type==='error'?'alert-circle':'info-circle';
  t.innerHTML = `<i class="ti ti-${icon}"></i>${msg}`;
  cont.appendChild(t);
  setTimeout(()=>{
    t.style.opacity = '0';
    t.style.transition = 'opacity .25s';
    setTimeout(()=>t.remove(), 250);
  }, 2500);
}

function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `enrobo-board-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('データを書き出しました', 'success');
}

function resetData(){
  if(!confirm('保存されているデータをすべて初期状態に戻します。よろしいですか？')) return;
  state = JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveState();
  renderAll();
  showToast('初期データに戻しました', 'success');
}

function renderAll(){
  renderList();
  renderClientNav();
  updateNotifyBadge();
  if(currentView==='dashboard') renderDashboard();
}

// Keyboard shortcuts
document.addEventListener('keydown', e=>{
  if(e.key==='Escape' && currentIssue) closeDetail();
  if((e.metaKey||e.ctrlKey) && e.key==='Enter' && currentIssue){
    addComment();
  }
});

// Init
renderAll();
</script>
